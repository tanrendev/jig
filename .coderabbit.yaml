# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
# Solo repo: CodeRabbit is the only reviewer. Ruff (ALL rules), ty, and
# zizmor already gate style, types, and workflow security in the prek
# hooks, so the review is pointed at what they cannot see: logic, edge
# cases, security, and design.

language: "en-US"

tone_instructions: >-
  Comment only on correctness, edge cases, security, and design. Never
  comment on formatting, import order, naming style, or anything a
  linter enforces. Plain factual sentences. No praise, no emoji.

reviews:
  profile: assertive
  # Formally request changes and only approve once comments are resolved;
  # with no human reviewer, this is the only gate that blocks a merge.
  request_changes_workflow: true
  commit_status: true
  # A review that could not run should show red, not silently pass.
  fail_commit_status: true
  high_level_summary: false
  changed_files_summary: false
  sequence_diagrams: false
  collapse_walkthrough: true
  poem: false
  review_status: false
  in_progress_fortune: false
  estimate_code_review_effort: false
  # Solo repo: nobody to suggest.
  suggested_reviewers: false
  auto_review:
    enabled: true
    drafts: false
    # Never stop reviewing long-running PRs.
    auto_pause_after_reviewed_commits: 0
  suggested_labels: true
  # Mirrors the taxonomy in CLAUDE.md; suggestions only, applied by hand.
  labeling_instructions:
    - label: "type::bug"
      instructions: "Something works differently than intended or documented."
    - label: "type::feature"
      instructions: "New capability or change in behavior."
    - label: "type::maintenance"
      instructions: >-
        Deps, CI, tooling, refactors, tech debt. No user-visible change.
    - label: "type::docs"
      instructions: "Documentation only."
    - label: "security"
      instructions: >-
        Touches a trust boundary, secret handling, or a vulnerability.
    - label: "breaking change"
      instructions: "Requires user action on upgrade."
  path_instructions:
    # Review conduct for every file. With request_changes_workflow on and
    # no human co-reviewer, an inflated or hedged finding blocks the merge
    # until dismissed by hand, so these rules guard the gate itself.
    - path: "**"
      instructions: >-
        Calibrate severity honestly: report a finding as critical or
        major only after tracing it end to end; inflated severity is
        worse than a missed nit. Never report a finding hedged on
        something verifiable in this repository; check the callers,
        config, or tests first and report only what survives. Do not
        report the change the PR sets out to make as a finding: when the
        title or description says behavior is removed or changed, review
        the execution rather than the intent, unless the blast radius
        clearly exceeds what the description acknowledges.
    - path: "**/*.py"
      instructions: >-
        House convention: every function and method defined in this repo
        takes keyword-only arguments (a bare * before the first
        parameter), and calls pass arguments by keyword unless the
        parameter is positional-only. Flag violations of either.
        Also flag speculative generality: abstractions with a single
        implementation, configuration for values that never change, and
        indirection serving a future not present in the diff. Prefer
        deletion over addition and the standard library over new
        dependencies.
        Flag behavior added or changed in the diff that no test
        exercises; test coverage is invisible to ruff and ty, so review
        is the only place it gets checked.
    - path: "tests/**"
      instructions: >-
        documentation/testing.md is the test strategy; validate every
        test change against it. In particular: the test sits in the
        right tier, hook tests execute command strings parsed from
        hooks.json rather than re-typed copies, every test is hermetic
        (writes stay inside tmp_path and no mutable host state such as
        the real HOME or ~/.local/share/jig is read; read-only access
        to the working tree is expected), and unit tests use no mocks,
        fakes, or monkeypatching.
        Flag tests that assert implementation details rather than
        observable behavior, and tests whose intent is not clear from
        the test name and body alone. Prefer plain pytest: no fixture
        for what a local variable can do, no parametrize for a single
        case.
  # Error-mode checks are the enforcement layer; path_instructions above
  # are advisory, so the two house rules are duplicated here as gates.
  pre_merge_checks:
    docstrings:
      # Docstrings are deliberately optional here (ruff D1 is ignored).
      mode: "off"
    title:
      mode: "error"
      requirements: >-
        Imperative mood, under 72 characters, conventional-commit style
        prefix (feat:, fix:, ci:, docs:, chore:, refactor:, test:).
    description:
      mode: "error"
    custom_checks:
      - name: "No speculative generality"
        mode: "error"
        instructions: >-
          Fail if the diff adds an abstraction with a single
          implementation, configuration for a value that never changes,
          or indirection that serves no caller in this diff.
      - name: "Keyword-only convention"
        mode: "error"
        instructions: >-
          Fail if a Python function or method defined in this diff lacks
          a bare * before its first parameter, or a call site passes a
          non-positional-only argument positionally.
  finishing_touches:
    # Generated docstrings would only narrate the obvious.
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: true
  tools:
    # Ruff and zizmor run locally via prek with full rule sets; repeating
    # them in review comments is noise.
    ruff:
      enabled: false
    zizmor:
      enabled: false

chat:
  art: false
  auto_reply: true
