name: workflow

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --locked --group dev
      # Provisions the managed runtime from nothing, exactly as a plugin
      # user would: catches a broken pin, installer URL, or shim path.
      - run: sh plugins/jig/scripts/setup.sh
      - run: uv run pytest
